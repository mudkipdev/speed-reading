<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speed Reading</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #fafafa;
    --fg: #1a1a1a;
    --muted: #999;
    --line: #ddd;
    --accent: #2563eb;
    --good: #16a34a;
    --bad: #dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1b1b1d;
      --fg: #e6e6e6;
      --muted: #82828a;
      --line: #3a3a3e;
      --accent: #5b8def;
      --good: #57c98a;
      --bad: #f07070;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 150%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  main {
    width: min(92vw, 560px);
    text-align: center;
  }
  #stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 3rem;
    font-variant-numeric: tabular-nums;
  }
  #stats b { color: var(--fg); font-weight: 600; }
  #display {
    height: 5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.6rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin-bottom: 3rem;
    user-select: none;
  }
  #display .fixation { color: var(--muted); font-weight: 400; }
  #display .feedback-good { color: var(--good); font-size: 1.4rem; font-weight: 500; }
  #display .feedback-bad { color: var(--bad); font-size: 1.4rem; font-weight: 500; }
  #answer {
    width: 100%;
    font-size: 1.3rem;
    text-align: center;
    padding: 0.6rem 1rem;
    border: none;
    border-bottom: 2px solid var(--line);
    background: transparent;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
    color: var(--fg);
  }
  #answer:focus { border-color: var(--accent); }
  #answer:disabled { opacity: 0.4; }
  #answer.shake { animation: shake 0.4s; border-color: var(--bad); }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-9px); }
    40% { transform: translateX(9px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  #hint {
    margin-top: 1.5rem;
    font-size: 0.8rem;
    color: var(--muted);
    min-height: 1.2em;
  }
  #start {
    font-size: 1rem;
    padding: 0.7rem 2.2rem;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-family: inherit;
  }
  #start:hover { filter: brightness(1.1); }
</style>
</head>
<body>
<main>
  <div id="stats">
    <span>level <b id="level">1</b></span>
    <span>streak <b id="streak">0</b></span>
    <span>speed <b id="speed">—</b></span>
  </div>
  <div id="display"><button id="start" autofocus>Start</button></div>
  <input id="answer" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="type the english word" disabled>
  <div id="hint"></div>
</main>

function decodeTier(blob) {
  const bytes = Uint8Array.from(atob(blob), (character) => character.charCodeAt(0));
  return new TextDecoder("utf-8").decode(bytes).split(",").map((pair) => {
    const [russian, english] = pair.split(":");
    return { russian, answers: english.split("|") };
  });
}

const WORDS = {};
for (const tier in ENCODED) WORDS[tier] = decodeTier(ENCODED[tier]);

const STREAK_TO_LEVEL_UP = 5;        // correct answers in a row to level up
const MISSES_TO_LEVEL_DOWN = 2;      // total misses within a level to level down
const START_SYLLABLE_DURATION = 450; // ms per syllable at level 1
const MIN_SYLLABLE_DURATION = 45;
const DURATION_FACTOR = 0.94;        // per-syllable time shrinks 6% per level (very slow)

const display = document.getElementById("display");
const answer = document.getElementById("answer");
const hint = document.getElementById("hint");
const levelEl = document.getElementById("level");
const streakEl = document.getElementById("streak");
const speedEl = document.getElementById("speed");

let level = 1;
let streak = 0;
let missesThisLevel = 0;
let currentWord = null;
let awaiting = false;
let recentWords = [];
let retryQueue = []; // missed words, requeued to reappear a few rounds later

function syllables(word) {
  return Math.max(1, (word.match(/[аеёиоуыэюя]/g) || []).length);
}

function syllableDuration() {
  return Math.max(MIN_SYLLABLE_DURATION, Math.round(START_SYLLABLE_DURATION * Math.pow(DURATION_FACTOR, level - 1)));
}

function duration(word) {
  return syllableDuration() * syllables(word);
}

// Which length tiers are in play: a window a few tiers wide so there's always
// a mix of lengths. The window slides up as the level climbs — longer tiers
// unlock and the shortest ones fade out.
function pool() {
  const maxTier = Math.min(4, 1 + Math.floor((level + 2) / 3));
  const minTier = Math.max(1, maxTier - 2);
  let words = [];
  for (let tier = minTier; tier <= maxTier; tier++) words = words.concat(WORDS[tier]);
  return words;
}

function pickWord() {
  // A missed word that has waited long enough comes back for another read.
  for (const item of retryQueue) item.due--;
  const readyIndex = retryQueue.findIndex((item) => item.due <= 0);
  if (readyIndex !== -1) return retryQueue.splice(readyIndex, 1)[0].word;

  const words = pool();
  let word;
  do {
    word = words[Math.floor(Math.random() * words.length)];
  } while (recentWords.includes(word.russian) && words.length > recentWords.length);
  recentWords.push(word.russian);
  if (recentWords.length > 15) recentWords.shift();
  return word;
}

function updateStats() {
  levelEl.textContent = level;
  streakEl.textContent = streak;
  speedEl.textContent = syllableDuration() + " ms/syllable";
}

function nextRound(delay) {
  awaiting = false;
  answer.disabled = true;
  setTimeout(() => {
    display.innerHTML = '<span class="fixation">+</span>';
    setTimeout(() => {
      currentWord = pickWord();
      display.textContent = currentWord.russian;
      setTimeout(() => {
        display.textContent = "";
        awaiting = true;
        answer.disabled = false;
        answer.classList.remove("shake");
        answer.value = "";
        answer.focus();
      }, duration(currentWord.russian));
    }, 500);
  }, delay);
}

function normalize(text) {
  return text.trim().toLowerCase();
}

function check() {
  if (!awaiting) return;
  const correct = currentWord.answers.includes(normalize(answer.value));
  if (correct) {
    streak++;
    display.innerHTML = '<span class="feedback-good">correct</span>';
    hint.textContent = "";
    if (streak >= STREAK_TO_LEVEL_UP) {
      level++;
      streak = 0;
      missesThisLevel = 0;
      hint.textContent = "level up";
    }
  } else {
    streak = 0;
    missesThisLevel++;
    display.innerHTML = '<span class="feedback-bad">' + currentWord.russian + '</span>';
    hint.textContent = "answer: " + currentWord.answers[0]
      + (answer.value.trim() ? " — you typed: " + answer.value.trim() : "");
    if (missesThisLevel >= MISSES_TO_LEVEL_DOWN && level > 1) {
      level--;
      missesThisLevel = 0;
      hint.textContent += " — level down";
    }
    shakeAnswer();
    // Bring the missed word back a few rounds later for another read.
    if (!retryQueue.some((item) => item.word.russian === currentWord.russian)) {
      retryQueue.push({ word: currentWord, due: 3 });
    }
  }
  updateStats();
  nextRound(correct ? 700 : 1600);
}

function shakeAnswer() {
  answer.classList.remove("shake");
  void answer.offsetWidth; // restart the animation
  answer.classList.add("shake");
}

answer.addEventListener("keydown", (event) => {
  if (event.key === "Enter") check();
});

document.addEventListener("keydown", () => {
  if (!answer.disabled && document.activeElement !== answer) answer.focus();
});

document.getElementById("start").addEventListener("click", () => {
  updateStats();
  hint.textContent = "read the russian word, then type its english cognate";
  nextRound(0);
});
</script>
</body>
